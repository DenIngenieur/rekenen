<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>➕ ➖ ✖️ ➗ | Math practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/intro.css">
</head>
<body>

<div class="grid">

  <!-- Video tile (styled as a modern card) -->
  <div class="tile vid">
    <h3>Videos</h3>
    <div class="video-links">
      <div class="lang-group">
        <strong>Nederlands</strong>
        <ul>
          <li><a href="https://www.youtube.com/watch?v=1fQriKgYbJk" target="_blank">video</a></li>
          <li><a href="https://www.youtube.com/shorts/cowMqv4ggCQ" target="_blank">short</a></li>
        </ul>
      </div>
      <div class="lang-group">
        <strong>🇬🇧 English</strong>
        <ul>
          <li><a href="https://www.youtube.com/watch?v=rEWvz7hgPh0" target="_blank">video</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Top row: single operations -->
  <a href="exercise.html?op=plus" class="tile plus">
    <img src="pics/plus.png" alt="Plus">
  </a>

  <a href="exercise.html?op=min" class="tile minus">
    <img src="pics/min.png" alt="Minus">
  </a>

  <a href="exercise.html?op=mul" class="tile multiply">
    <img src="pics/mul.png" alt="Multiply">
  </a>

  <a href="exercise.html?op=div" class="tile divide">
    <img src="pics/div.png" alt="Divide">
  </a>

  <!-- Middle row: combinations -->
  <a href="exercise.html?op=plusmin" class="tile plusmin wide">
    <img src="pics/plusmin.png" alt="Plus and Minus">
  </a>

  <a href="exercise.html?op=muldiv" class="tile muldiv wide">
    <img src="pics/muldiv.png" alt="Multiply and Divide">
  </a>

  <!-- Bottom row: all four -->
  <a href="exercise.html?op=mix" class="tile mix full">
    <img src="pics/mix.png" alt="All Symbols">
  </a>

</div>

</body>
</html>
